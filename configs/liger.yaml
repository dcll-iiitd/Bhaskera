# =============================================================================
# Bhaskera — Falcon-7B SFT on UltraChat, 3 GPUs
#             W&B + Ray Dashboard | Flash Attention 2 | Liger Kernels
# =============================================================================

model:
  name: "tiiuae/falcon-7b"
  dtype: "bfloat16"
  attn_impl: "flash_attention_2"
  use_liger_kernel: true
  trust_remote_code: false

data:
  name: "ultrachat"
  seq_len: 2048
  num_workers: 8

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["auto"]
  include_experts: false
  freeze_router: true
  modules_to_save: []

training:
  batch_size: 4
  grad_accum: 4
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 2000
  num_epochs: 1
  warmup_steps: 100
  max_grad_norm: 1.0
  seed: 42
  deterministic: false

  distributed:
    strategy: "fsdp"
    fsdp:
      sharding_strategy: "FULL_SHARD"
      transformer_layer_cls: []
      param_dtype: "bfloat16"
      reduce_dtype: "bfloat16"
      buffer_dtype: "bfloat16"
      activation_checkpointing: true
      cpu_offload: false
      shard_experts_individually: false

checkpoint:
  enabled: true
  save_dir: "./checkpoints/falcon7b-ultrachat-flash-liger"
  save_interval: 1
  keep_last_n: 2

logging:
  # Tracker can be a string or a list. Ray Dashboard runs alongside
  # whichever offline tracker(s) you pick.  Set to null/none to use
  # Ray Dashboard only.
  tracker: ["wandb"]                # ← will be combined with Ray automatically
  project: "bhaskera"
  run_name: "falcon7b-ultrachat-lora-3gpu-flash-liger"
  log_gpu_every_n_steps: 10
  tags: []
  group: null

# -----------------------------------------------------------------------------
# Observability stack — Ray Dashboard is on by default.
# Enable Prometheus / Grafana by pointing them at your existing servers
# (the framework does NOT spin them up for you).
# -----------------------------------------------------------------------------
monitoring:
  dashboard: true                   # Ray Dashboard
  dashboard_host: "0.0.0.0"
  dashboard_port: 8265
  metrics_export_port: 8080         # Prometheus scrapes this on each node

  prometheus:
    enabled: false                  # set true if you have a Prometheus server
    host: "http://localhost:9090"
    name: "Prometheus"

  grafana:
    enabled: false                  # set true to embed panels in Ray Dashboard
    host: "http://localhost:3000"
    iframe_host: null
    org_id: "1"

  metrics:
    enabled: true
    system_every_n_steps: 10        # GPU/CPU/IO push cadence (every rank)
    cuda_every_n_steps: 10          # PyTorch CUDA-allocator push cadence
    gpu: true
    cpu: true
    cuda_memory: true
    throughput: true
    peak_tflops_per_gpu: 312.0      # A100 bf16; H100 ≈ 989; L4 ≈ 121
    throughput_window: 50
    throughput_warmup: 5
